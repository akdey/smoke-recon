<script>
        const terminalBody = document.getElementById('terminalBody');
        const clearBtn = document.getElementById('clearBtn');
        
        const sources = [
            '[REDDIT_WORKER]',
            '[X_SENTIMENT_API]',
            '[CIRCUIT_BREAKER]',
            '[DICTIONARY_LOAD]',
            '[CORE_RECON]',
            '[SCORING_ENGINE]',
            '[DATABASE_SYNC]',
            '[WEBSOCKET_CLIENT]'
        ];

        const messages = {
            info: [
                'Establishing connection to cluster alpha-01...',
                'Parsing metadata stream from source shard 77.',
                'Dictionary re-indexed. 452 new smoke tokens identified.',
                'Telemetry heartbeat stable. 4.2ms latency.',
                'Worker node 04 assigned to sub-task 882.'
            ],
            success: [
                'Data packet successfully decrypted and routed.',
                'Sentiment score calculated: 0.892 (BULLISH).',
                'Successfully bridged connection to Reddit Flux.',
                'System state synchronized with distributed ledger.',
                'Pattern recognition complete. No anomalies detected.'
            ],
            warning: [
                'Latency spike detected in Frankfurt node: 142ms.',
                'Rate limit threshold approaching for X_SENTIMENT_API.',
                'Low confidence score on keyword "squeeze" in sector Tech.',
                'Resource allocation peaking at 88%. Scaling pending.',
                'Retrying connection attempt 2/5 for secondary mirror.'
            ],
            error: [
                'CRITICAL: Fragmented packet dropped in circuit breaker.',
                'AUTHENTICATION_FAILED: Provider key revoked.',
                'FATAL: Memory leak detected in worker thread 09.',
                'DATA_CORRUPTION: Checksum mismatch on block 9921.',
                'CONNECTION_REFUSED: Peer rejected handshake protocol.'
            ]
        };

        function getTimestamp() {
            const now = new Date();
            return now.toISOString().replace('T', ' ').substring(0, 19);
        }

        function createLogLine() {
            const typeProb = Math.random();
            let type = 'info';
            let colorClass = 'text-mesh-teal'; // mesh-gamma represented as teal here
            
            if (typeProb > 0.95) {
                type = 'error';
                colorClass = 'text-bear-glow';
            } else if (typeProb > 0.85) {
                type = 'warning';
                colorClass = 'text-on-surface-variant'; // neutral-pulse
            } else if (typeProb > 0.6) {
                type = 'success';
                colorClass = 'text-primary-fixed';
            }

            const timestamp = getTimestamp();
            const source = sources[Math.floor(Math.random() * sources.length)];
            const message = messages[type][Math.floor(Math.random() * messages[type].length)];

            const div = document.createElement('div');
            div.className = 'flex gap-3 leading-relaxed border-l-2 border-transparent hover:border-white/10 hover:bg-white/5 transition-all pl-2 py-0.5';
            
            div.innerHTML = `
                <span class="text-on-surface-variant/30 shrink-0 select-none">${timestamp}</span>
                <span class="text-mesh-cobalt font-bold shrink-0">${source}</span>
                <span class="${colorClass} break-all">${message}</span>
            `;

            terminalBody.appendChild(div);
            
            // Auto-scroll
            terminalBody.scrollTop = terminalBody.scrollHeight;

            // Cleanup old logs to prevent memory bloat
            if (terminalBody.children.length > 100) {
                terminalBody.removeChild(terminalBody.firstChild);
            }
        }

        // Initialize with some lines
        for(let i=0; i<15; i++) {
            createLogLine();
        }

        // Generate logs continuously
        setInterval(() => {
            if (Math.random() > 0.4) {
                createLogLine();
            }
        }, 800);

        // Clear console functionality
        clearBtn.addEventListener('click', () => {
            terminalBody.innerHTML = '';
            const resetMsg = document.createElement('div');
            resetMsg.className = 'text-primary-fixed text-center py-4 border border-dashed border-primary/20 rounded';
            resetMsg.innerHTML = '-- TERMINAL BUFFER CLEARED --';
            terminalBody.appendChild(resetMsg);
        });

    </script>
